name: Daily scene snapshot

# Propagates asteroid orbital elements to today and writes the top-100
# nearest bodies per active base into `scene_snapshots` (db_design.md §11.6).

on:
  schedule:
    - cron: "15 2 * * *"   # 02:15 UTC daily
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (blank = today UTC)"
        required: false
        default: ""
      base:
        description: "Restrict to one base name (blank = all bases)"
        required: false
        default: ""

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase

      - name: Build snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.base }}" ]; then
            ARGS="$ARGS --base ${{ github.event.inputs.base }}"
          fi
          python pipeline/snapshot_daily.py $ARGS
